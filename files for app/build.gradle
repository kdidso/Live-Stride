apply plugin: 'com.android.application'

def elevationApiBaseUrl =
        project.findProperty("LIVESTRIDE_ELEVATION_API_BASE_URL")
                ?: "https://elevation.livestride.run"
def mapContextApiBaseUrl =
        project.findProperty("LIVESTRIDE_MAP_CONTEXT_API_BASE_URL")
                ?: "https://maps.livestride.run"
def arcgisAccessToken =
        project.findProperty("LIVESTRIDE_ARCGIS_ACCESS_TOKEN")
                ?: "AAPTa6e-VHCpyaJQSVWWFBCOJeg..-kkDAZUlISWNULSNF-s-scZHXrf3n2pwYlWCOOhke9j41vJ12917wf3Dh4L3k6zpyCh1Wu-5LoBroQjO_GQLskgjl2Ei4mYqDPk4v6DqyASw19PSFLbHEjk_V78G4C-l96txQzVwI50Eis9PWHiDrfc0TX504gbYrLNQW8odg_8xBIve9DMjfnzg2YxsRwvJHo3Ue5IdsV8Jx78C0Z8fCi9CBbJSmgihRn9kDiSq7zIN8NLF90q7qw..AT1_Qjw2SOCv"

android {
    namespace "com.kdidso.livestride"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.kdidso.livestride"
        minSdkVersion    rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode      3
        versionName      "1.0.2"
        buildConfigField "String", "ELEVATION_API_BASE_URL", "\"${elevationApiBaseUrl}\""
        buildConfigField "String", "MAP_CONTEXT_API_BASE_URL", "\"${mapContextApiBaseUrl}\""
        buildConfigField "String", "ARCGIS_ACCESS_TOKEN", "\"${arcgisAccessToken}\""
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            // Only these two files – no extra comma or plugin reference
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            // Debug build – no minification
        }
    }

    buildFeatures {
        buildConfig true
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"

    // Needed for native GPS tracking with FusedLocationProviderClient
    implementation 'com.google.android.gms:play-services-location:21.3.0'

    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.json:json:20240303"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch (Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
