    function metersToMiles(meters) {
      return meters / 1609.34;
    }

    function haversineDistance(a, b) {
      const toRad = value => value * Math.PI / 180;
      const R = 6371000;
      const lat1 = toRad(a[1]);
      const lat2 = toRad(b[1]);
      const dLat = toRad(b[1] - a[1]);
      const dLng = toRad(b[0] - a[0]);
      const h = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
    }

    function collectCoordinateLines(value, lines = []) {
      if (!Array.isArray(value) || value.length === 0) return lines;

      const isCoordinate = point =>
        Array.isArray(point) &&
        point.length >= 2 &&
        Number.isFinite(Number(point[0])) &&
        Number.isFinite(Number(point[1]));

      if (value.length >= 2 && value.every(isCoordinate)) {
        lines.push(value.map(point => [Number(point[0]), Number(point[1])]));
        return lines;
      }

      value.forEach(child => collectCoordinateLines(child, lines));
      return lines;
    }

    function bearingDegrees(from, to) {
      const lat1 = from[1] * Math.PI / 180;
      const lat2 = to[1] * Math.PI / 180;
      const deltaLon = (to[0] - from[0]) * Math.PI / 180;
      const y = Math.sin(deltaLon) * Math.cos(lat2);
      const x =
        Math.cos(lat1) * Math.sin(lat2) -
        Math.sin(lat1) * Math.cos(lat2) * Math.cos(deltaLon);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function angleDifference(a, b) {
      const difference = Math.abs(a - b) % 360;
      return difference > 180 ? 360 - difference : difference;
    }

    function polylineLength(points) {
      let total = 0;
      for (let i = 1; i < points.length; i += 1) {
        total += haversineDistance(points[i - 1], points[i]);
      }
      return total;
    }

    function pointAlongPolyline(points, targetMeters) {
      if (!points.length) return null;
      if (targetMeters <= 0) return points[0];

      let traversed = 0;
      for (let i = 1; i < points.length; i += 1) {
        const a = points[i - 1];
        const b = points[i];
        const segmentMeters = haversineDistance(a, b);
        if (traversed + segmentMeters >= targetMeters) {
          const fraction = segmentMeters > 0
            ? (targetMeters - traversed) / segmentMeters
            : 0;
          return [
            a[0] + (b[0] - a[0]) * fraction,
            a[1] + (b[1] - a[1]) * fraction
          ];
        }
        traversed += segmentMeters;
      }
      return points[points.length - 1];
    }

    function projectOntoPolyline(points, target) {
      let best = {
        point: points[0],
        distanceMeters: haversineDistance(points[0], target),
        alongMeters: 0
      };
      let traversed = 0;

      for (let i = 1; i < points.length; i += 1) {
        const a = points[i - 1];
        const b = points[i];
        const segmentMeters = haversineDistance(a, b);
        if (segmentMeters <= 0) continue;

        const refLat = ((a[1] + b[1] + target[1]) / 3) * Math.PI / 180;
        const ax = a[0] * Math.cos(refLat);
        const ay = a[1];
        const bx = b[0] * Math.cos(refLat);
        const by = b[1];
        const tx = target[0] * Math.cos(refLat);
        const ty = target[1];
        const dx = bx - ax;
        const dy = by - ay;
        const denominator = dx * dx + dy * dy;
        const fraction = denominator > 0
          ? Math.max(0, Math.min(1, ((tx - ax) * dx + (ty - ay) * dy) / denominator))
          : 0;
        const projected = [
          a[0] + (b[0] - a[0]) * fraction,
          a[1] + (b[1] - a[1]) * fraction
        ];
        const distanceMeters = haversineDistance(projected, target);

        if (distanceMeters < best.distanceMeters) {
          best = {
            point: projected,
            distanceMeters,
            alongMeters: traversed + segmentMeters * fraction
          };
        }
        traversed += segmentMeters;
      }

      return best;
    }

    function createBridgeTunnelMatcher() {
      const matcher = {
        state: "normal",
        lastRawPoint: null,
        lastRawTime: 0,
        speeds: [],
        route: [],
        structureRoute: [],
        segments: [],
        branches: [],
        observations: [],
        entryObservations: [],
        routeLength: 0,
        progress: 0,
        lastMatchedTime: 0,
        holdStartedAt: 0,
        connectedRecoveryStartedAt: 0,
        noExitRecoveryStartedAt: 0,
        lastMatchedOutputPoint: null,
        lastMatchedOutputTime: 0,
        heldDistance: 0,
        structureType: "",
        structureId: ""
      };

      function rawHandoffIsStrong(accuracy) {
        const reportedAccuracy = Number(accuracy);
        return Number.isFinite(reportedAccuracy) && reportedAccuracy <= 5;
      }

      function entryNeedsStrongerEvidence(
        accuracy,
        entryDistance,
        evidence
      ) {
        const reportedAccuracy = Number(accuracy);
        const excellentAccuracy = Number.isFinite(reportedAccuracy) && reportedAccuracy <= 4;
        if (excellentAccuracy) {
          return evidence.headingError > 35;
        }

        if (entryDistance <= 5) return false;

        if (evidence.observationSpan < 1500) return true;
        if (!evidence.strongApproachTrend) return true;
        if (evidence.headingError > 55) return true;
        if (evidence.entranceApproachError > 75) return true;
        return evidence.recentSharpReversal && !evidence.strongApproachTrend;
      }

      function entryEvidence(rawCoord, entrance, structureBearing) {
        if (matcher.entryObservations.length < 2) return null;

        let first = null;
        let previous = null;
        let previousHeading = null;
        let firstDistance = Number.POSITIVE_INFINITY;
        let closingSteps = 0;
        let recentSharpReversal = false;

        matcher.entryObservations.forEach(observation => {
          const distanceFromCurrent = haversineDistance(observation.point, rawCoord);
          if (!first && distanceFromCurrent >= 2) {
            first = observation;
            firstDistance = haversineDistance(observation.point, entrance);
          }

          if (previous) {
            const priorDistance = haversineDistance(previous.point, entrance);
            const currentDistance = haversineDistance(observation.point, entrance);
            if (priorDistance > currentDistance + 0.75) closingSteps += 1;

            const heading = bearingDegrees(previous.point, observation.point);
            if (
              previousHeading !== null &&
              angleDifference(previousHeading, heading) >= 135
            ) {
              recentSharpReversal = true;
            }
            previousHeading = heading;
          }
          previous = observation;
        });

        if (!first) return null;

        const currentDistance = haversineDistance(rawCoord, entrance);
        const closingMeters = firstDistance - currentDistance;
        const movementBearing = bearingDegrees(first.point, rawCoord);
        const entranceBearing = bearingDegrees(rawCoord, entrance);

        return {
          movementBearing,
          headingError: angleDifference(movementBearing, structureBearing),
          entranceApproachError: angleDifference(movementBearing, entranceBearing),
          approachTrend: closingMeters >= 1.5 || closingSteps >= 1,
          strongApproachTrend: closingMeters >= 3 || closingSteps >= 2,
          recentSharpReversal,
          observationSpan: previous ? previous.time - first.time : 0
        };
      }

      function noExitRelaxedHandoffIsAllowed(accuracy, now) {
        const reportedAccuracy = Number(accuracy);
        return matcher.noExitRecoveryStartedAt > 0 &&
          now - matcher.noExitRecoveryStartedAt >= 10000 &&
          Number.isFinite(reportedAccuracy) &&
          reportedAccuracy <= 10;
      }

      function connectedRecoveryHandoffIsAllowed(rawCoord, now) {
        if (!matcher.connectedRecoveryStartedAt) return true;

        const recoveryAge = now - matcher.connectedRecoveryStartedAt;
        if (recoveryAge < 5000) return false;
        if (recoveryAge >= 12000) return true;
        return !earlyHandoffLooksLikeOutlier(rawCoord, now);
      }

      function earlyHandoffLooksLikeOutlier(rawCoord, now) {
        if (!matcher.lastMatchedOutputPoint || !matcher.lastMatchedOutputTime) return false;

        const elapsed = (now - matcher.lastMatchedOutputTime) / 1000;
        if (elapsed <= 0 || elapsed > 5) return false;

        const speed = haversineDistance(matcher.lastMatchedOutputPoint, rawCoord) / elapsed;
        if (speed > 10) return true;

        const rawProjection = projectOntoPolyline(matcher.route, rawCoord);
        return rawProjection.alongMeters < matcher.progress - 8;
      }

      function nearbySegments(coord) {
        if (!map?.getStyle || !map.loaded()) return [];

        const availableLayers = new Set(
          (map.getStyle().layers || []).map(layer => layer.id)
        );
        const pathLayers = ["Path", "Path minor"].filter(id =>
          availableLayers.has(id)
        );
        if (!pathLayers.length) return [];

        const center = map.project(coord);
        const radiusPixels = 100;
        const features = map.queryRenderedFeatures(
          [
            [center.x - radiusPixels, center.y - radiusPixels],
            [center.x + radiusPixels, center.y + radiusPixels]
          ],
          { layers: pathLayers }
        );

        const segments = [];
        features.forEach((feature, featureIndex) => {
          collectCoordinateLines(feature.geometry?.coordinates).forEach((points, lineIndex) => {
            if (points.length < 2) return;
            segments.push({
              id: `${feature.id ?? `rendered_${featureIndex}`}:${lineIndex}`,
              brunnel: String(feature.properties?.brunnel || "").toLowerCase(),
              subclass: String(feature.properties?.subclass || "").toLowerCase(),
              points
            });
          });
        });
        return segments;
      }

      function findBranches(junction) {
        const branches = [];
        matcher.segments.forEach(segment => {
          if (
            segment.id === matcher.structureId ||
            segment.brunnel === "tunnel" ||
            segment.brunnel === "bridge" ||
            segment.points.length < 2
          ) {
            return;
          }

          [
            {
              distance: haversineDistance(junction, segment.points[0]),
              points: segment.points
            },
            {
              distance: haversineDistance(
                junction,
                segment.points[segment.points.length - 1]
              ),
              points: [...segment.points].reverse()
            }
          ].forEach(option => {
            if (option.distance <= 4) {
              branches.push({
                segment,
                points: option.points,
                heading: bearingDegrees(option.points[0], option.points[1])
              });
            }
          });
        });
        return branches;
      }

      function buildBranchRoute(initialBranch) {
        const route = [...initialBranch.points];
        const used = new Set([matcher.structureId, initialBranch.segment.id]);

        for (let depth = 0; depth < 3; depth += 1) {
          const routeEnd = route[route.length - 1];
          const incomingBearing = bearingDegrees(route[route.length - 2], routeEnd);
          let best = null;

          matcher.segments.forEach(candidate => {
            if (
              used.has(candidate.id) ||
              candidate.brunnel === "tunnel" ||
              candidate.brunnel === "bridge" ||
              candidate.points.length < 2
            ) {
              return;
            }

            [
              {
                distance: haversineDistance(routeEnd, candidate.points[0]),
                points: candidate.points
              },
              {
                distance: haversineDistance(
                  routeEnd,
                  candidate.points[candidate.points.length - 1]
                ),
                points: [...candidate.points].reverse()
              }
            ].forEach(option => {
              if (option.distance > 4) return;
              const score =
                option.distance +
                angleDifference(
                  incomingBearing,
                  bearingDegrees(option.points[0], option.points[1])
                ) / 20;
              if (!best || score < best.score) {
                best = { candidate, points: option.points, score };
              }
            });
          });

          if (!best) break;
          route.push(...best.points.slice(1));
          used.add(best.candidate.id);
        }
        return route;
      }

      function chooseObservedBranch() {
        if (matcher.observations.length < 2) return null;
        const first = matcher.observations[0];
        const last = matcher.observations[matcher.observations.length - 1];
        if (last.time - first.time < 2000) return null;
        if (haversineDistance(first.point, last.point) < 3) return null;

        const observedBearing = bearingDegrees(first.point, last.point);
        const ranked = matcher.branches
          .map(branch => ({
            branch,
            error: angleDifference(observedBearing, branch.heading)
          }))
          .sort((a, b) => a.error - b.error);

        if (!ranked.length || ranked[0].error > 65) return null;
        if (ranked.length > 1 && ranked[1].error - ranked[0].error < 25) return null;
        return ranked[0].branch;
      }

      function selectBranch(branch, initialDistance, now) {
        matcher.route = buildBranchRoute(branch);
        matcher.routeLength = polylineLength(matcher.route);
        matcher.progress = Math.min(matcher.routeLength, initialDistance);
        matcher.lastMatchedTime = now;
        matcher.state = "recovery";
        matcher.branches = [];
        matcher.observations = [];
        matcher.heldDistance = 0;
        matcher.connectedRecoveryStartedAt = now;
        matcher.noExitRecoveryStartedAt = 0;
      }

      function clearMatch() {
        matcher.state = "normal";
        matcher.route = [];
        matcher.structureRoute = [];
        matcher.segments = [];
        matcher.branches = [];
        matcher.observations = [];
        matcher.routeLength = 0;
        matcher.progress = 0;
        matcher.holdStartedAt = 0;
        matcher.connectedRecoveryStartedAt = 0;
        matcher.noExitRecoveryStartedAt = 0;
        matcher.lastMatchedOutputPoint = null;
        matcher.lastMatchedOutputTime = 0;
        matcher.heldDistance = 0;
        matcher.structureType = "";
        matcher.structureId = "";
      }

      function medianSpeed() {
        if (!matcher.speeds.length) return 2.5;
        const sorted = matcher.speeds.map(sample => sample.speed).sort((a, b) => a - b);
        return sorted[Math.floor(sorted.length / 2)];
      }

      matcher.process = (rawCoord, accuracy, now) => {
        const accuracyIsGood = !Number.isFinite(Number(accuracy)) || Number(accuracy) <= 10;

        if (matcher.lastRawPoint && matcher.lastRawTime && accuracyIsGood) {
          const elapsed = (now - matcher.lastRawTime) / 1000;
          const speed = elapsed > 0
            ? haversineDistance(matcher.lastRawPoint, rawCoord) / elapsed
            : 0;
          if (elapsed <= 5 && speed >= 0.5 && speed <= 8) {
            matcher.speeds.push({ time: now, speed });
          }
        }
        matcher.speeds = matcher.speeds.filter(sample => now - sample.time <= 20000);
        matcher.entryObservations.push({ point: rawCoord, time: now });
        matcher.entryObservations = matcher.entryObservations.filter(
          observation => now - observation.time <= 5000
        );

        if (matcher.state === "normal" && matcher.lastRawPoint) {
          const segments = nearbySegments(rawCoord);
          const structures = segments.filter(segment =>
            segment.brunnel === "tunnel" || segment.brunnel === "bridge"
          );
          let candidate = null;

          structures.forEach(structure => {
            [
              { point: structure.points[0], enterAtStart: true },
              {
                point: structure.points[structure.points.length - 1],
                enterAtStart: false
              }
            ].forEach(endpoint => {
              const distance = haversineDistance(rawCoord, endpoint.point);
              if (!candidate || distance < candidate.distance) {
                candidate = { structure, ...endpoint, distance };
              }
            });
          });

          if (candidate && candidate.distance <= 7) {
            const structurePoints = candidate.enterAtStart
              ? candidate.structure.points
              : [...candidate.structure.points].reverse();
            const structureBearing = bearingDegrees(structurePoints[0], structurePoints[1]);
            const evidence = entryEvidence(rawCoord, candidate.point, structureBearing);

            if (
              evidence &&
              evidence.approachTrend &&
              evidence.headingError <= 75 &&
              !entryNeedsStrongerEvidence(
                accuracy,
                candidate.distance,
                evidence
              )
            ) {
              matcher.segments = segments;
              matcher.structureRoute = [...structurePoints];
              matcher.route = [...structurePoints];
              matcher.routeLength = polylineLength(matcher.route);
              matcher.progress = projectOntoPolyline(matcher.route, rawCoord).alongMeters;
              matcher.lastMatchedTime = now;
              matcher.structureType = candidate.structure.brunnel;
              matcher.structureId = candidate.structure.id;
              matcher.state = "structure";
            }
          }
        }

        let output = rawCoord;
        let matched = false;

        if (matcher.state === "junction_hold") {
          const elapsed = Math.max(0, (now - matcher.lastMatchedTime) / 1000);
          matcher.heldDistance += medianSpeed() * elapsed;
          matcher.lastMatchedTime = now;
          matcher.observations.push({ point: rawCoord, time: now });
          output = matcher.structureRoute[matcher.structureRoute.length - 1];
          matched = true;

          if (rawHandoffIsStrong(accuracy)) {
            clearMatch();
            output = rawCoord;
            matched = false;
          } else {
            const branch = chooseObservedBranch();
            if (branch) {
              selectBranch(branch, matcher.heldDistance, now);
              output = pointAlongPolyline(matcher.route, matcher.progress);
            } else if (now - matcher.holdStartedAt >= 5000) {
              matcher.state = "raw_recovery";
              output = rawCoord;
              matched = false;
            }
          }
        } else if (matcher.state === "raw_recovery") {
          output = rawCoord;
          matched = false;
          if (rawHandoffIsStrong(accuracy)) clearMatch();
        } else if (matcher.state !== "normal") {
          const elapsed = Math.max(0, (now - matcher.lastMatchedTime) / 1000);
          matcher.progress = Math.min(
            matcher.routeLength,
            matcher.progress + medianSpeed() * elapsed
          );
          matcher.lastMatchedTime = now;
          output = pointAlongPolyline(matcher.route, matcher.progress);
          matched = true;

          if (matcher.state === "structure" && matcher.progress >= matcher.routeLength) {
            const junction = matcher.structureRoute[matcher.structureRoute.length - 1];
            matcher.branches = findBranches(junction);

            if (matcher.branches.length === 1) {
              selectBranch(matcher.branches[0], 0, now);
              output = pointAlongPolyline(matcher.route, matcher.progress);
            } else if (matcher.branches.length > 1) {
              matcher.state = "junction_hold";
              matcher.holdStartedAt = now;
              matcher.lastMatchedTime = now;
              matcher.heldDistance = 0;
              matcher.observations = [{ point: rawCoord, time: now }];
              output = junction;
            } else {
              matcher.state = "recovery";
              matcher.connectedRecoveryStartedAt = 0;
              matcher.noExitRecoveryStartedAt = now;
            }
          }

          if (matcher.state === "recovery") {
            if (
              (
                rawHandoffIsStrong(accuracy) &&
                connectedRecoveryHandoffIsAllowed(rawCoord, now)
              ) ||
              noExitRelaxedHandoffIsAllowed(accuracy, now)
            ) {
              clearMatch();
              output = rawCoord;
              matched = false;
            }
          }
        }

        matcher.lastRawPoint = rawCoord;
        matcher.lastRawTime = now;

        if (matched) {
          matcher.lastMatchedOutputPoint = output;
          matcher.lastMatchedOutputTime = now;
        }

        return {
          coord: output,
          matched,
          state: matcher.state,
          structureType: matcher.structureType,
          accuracyIsGood
        };
      };

      return matcher;
    }

    function formatTime(ms) {
      const totalSec = Math.floor(ms / 1000);
      const h = String(Math.floor(totalSec / 3600)).padStart(2, "0");
      const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2, "0");
      const s = String(totalSec % 60).padStart(2, "0");
      return `${h}:${m}:${s}`;
    }

    function formatPace(minsPerMile) {
      if (!isFinite(minsPerMile) || minsPerMile <= 0) return "-";
      let minutes = Math.floor(minsPerMile);
      let seconds = Math.round((minsPerMile - minutes) * 60);
      if (seconds === 60) {
        minutes += 1;
        seconds = 0;
      }
      return `${minutes}:${seconds.toString().padStart(2, "0")} /mi`;
    }

    async function fetchElevation(lat, lon) {
      try {
        const response = await fetch(
          `https://elevation.livestride.run/api/v1/lookup?locations=${lat},${lon}`
        );
        const data = await response.json();
        return data.results?.[0]?.elevation ?? null;
      } catch (err) {
        console.error("Elevation fetch error:", err);
        return null;
      }
    }

    function updateStatsDisplay(distanceMi, instPace, avgPace, elapsedMs, elevationFt) {
      const timeHtml = `Time: ${formatTime(elapsedMs)}`;
      const elevHtml = elevationFt != null ? `Elev: ${Math.round(elevationFt)} ft` : "Elev: -";
      const distHtml = `Distance: ${distanceMi.toFixed(2)} mi`;
      const paceHtml = `Pace: ${formatPace(instPace)}`;
      const avgHtml = `Avg Pace: ${formatPace(avgPace)}`;

      statsBar.innerHTML = `
        <div class="stats-line">
          <span>${timeHtml}</span><span class="stats-separator">|</span><span>${elevHtml}</span>
        </div>
        <div class="stats-line">
          <span>${distHtml}</span><span class="stats-separator">|</span><span>${paceHtml}</span><span class="stats-separator">|</span><span>${avgHtml}</span>
        </div>
      `;
    }

    function addOrUpdatePath() {
      const coords = pathCoords.map(pt => [pt.lon, pt.lat]);
      const data = {
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: coords
        }
      };

      if (!map.getSource("run-path")) {
        map.addSource("run-path", {

          data
        });

        map.addLayer({
          id: "run-line",

            "line-join": "round",
            "line-cap": "round"
          },

            "line-color": "#00FFFF",
            "line-width": 4
          }
        });
      } else {
        map.getSource("run-path").setData(data);
      }
    }
function buildSequenceLineSegments(points) {
  const segments = [];
  let currentSegment = [];
  let previousSequence = null;

  points.forEach(point => {
    const pointCoords = [point.lon, point.lat];
    const sequence = point.sequenceNum;

    if (
      currentSegment.length > 0 &&
      previousSequence != null &&
      sequence != null &&
      sequence - previousSequence > 1
    ) {
      if (currentSegment.length > 1) {
        segments.push(currentSegment);
      }

      currentSegment = [];
    }

    currentSegment.push(pointCoords);
    previousSequence = sequence;
  });

  if (currentSegment.length > 1) {
    segments.push(currentSegment);
  }

  return segments;
}
function hasSequenceGap(points) {
  for (let i = 1; i < points.length; i++) {
    const previousSequence = points[i - 1].sequenceNum;
    const currentSequence = points[i].sequenceNum;

    if (
      previousSequence != null &&
      currentSequence != null &&
      currentSequence - previousSequence > 1
    ) {
      return true;
    }
  }

  return false;
}
function getLatestSequencePoint(points) {
  if (!points.length) return null;

  return points.reduce((latest, point) => {
    if (!latest) return point;

    if (point.sequenceNum != null && latest.sequenceNum != null) {
      return point.sequenceNum > latest.sequenceNum ? point : latest;
    }

    return (point.timestamp || 0) > (latest.timestamp || 0) ? point : latest;
  }, null);
}

function addOrUpdateNativePath() {
  const segments = buildSequenceLineSegments(nativePathCoords);

  const data = {
    type: "Feature",
    geometry: {
      type: "MultiLineString",
      coordinates: segments
    }
  };

  if (!map.getSource("native-run-path")) {
    map.addSource("native-run-path", {

      data
    });

    map.addLayer({

        "line-cap": "round"
      },
      paint: {
        "line-color": "#B000FF",
        "line-width": 4,
        "line-opacity": 0.9
      }
    });
  } else {
    map.getSource("native-run-path").setData(data);
  }
}
    function clearRunPathLayer() {

function clearNativeRunPathLayer() {

    function hideConnectionStatusSoon() {
      setTimeout(() => {
        if (connectionStatusEl) connectionStatusEl.style.display = "none";
      }, 3000);
    }

}

function hideViewerStatus(message = null) {

  if (viewerStatusEl) viewerStatusEl.style.display = "none";

}

function hideViewerStatusSoon(message = null, delayMs = 3000) {

  }

  viewerStatusHideTimerId = setTimeout(() => {
    hideViewerStatus(message);
  }, delayMs);
}

    async function requestViewerWakeLock() {
      if (!("wakeLock" in navigator)) return;
      if (!document.body.classList.contains("viewer-mode")) return;
      if (!viewerFollowing) return;
      if (viewerWakeLock) return;

      try {
        viewerWakeLock = await navigator.wakeLock.request("screen");
        viewerWakeLock.addEventListener("release", () => {
          viewerWakeLock = null;
        });
      } catch (err) {
        console.warn("Viewer wake lock request failed:", err);
      }
    }

    async function releaseViewerWakeLock() {
      if (!viewerWakeLock) return;

      const lock = viewerWakeLock;
      viewerWakeLock = null;

      try {
        await lock.release();
      } catch (err) {
        console.warn("Viewer wake lock release failed:", err);
      }
    }

    function updateViewerWakeLock() {
      if (document.body.classList.contains("viewer-mode") && viewerFollowing) {
        requestViewerWakeLock();
      } else {
        releaseViewerWakeLock();
      }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        updateViewerWakeLock();
      } else {
        releaseViewerWakeLock();
      }
    });

    async function safeInsertRunPoint(pointPayload) {
      const { error } = await supabaseClient.from("run_points").insert(pointPayload);

      if (error) {
        console.warn("Supabase point insert failed; queued for retry:", error);
        pendingSupabasePoints.push(pointPayload);
        runnerSyncHadFailure = true;
        showConnectionStatus("Connection lost - saving run locally", "bad");
        return false;
      }

      return true;
    }

    async function safeUpdateRunSummary(updatePayload) {
      if (!activeRunId) return false;

      const { error } = await supabaseClient
        .from("runs")
        .update(updatePayload)
        .eq("id", activeRunId);

      if (error) {
        console.warn("Supabase run update failed; queued latest summary:", error);
        pendingRunUpdate = updatePayload;
        runnerSyncHadFailure = true;
        showConnectionStatus("Connection lost - syncing when back online", "bad");
        return false;
      }

      return true;
    }

    async function syncFinishNow(runId, finishPayload) {
      if (!runId || !navigator.onLine) return false;

      try {
        const { error } = await supabaseClient
          .from("runs")
          .update(finishPayload)
          .eq("id", runId);

        if (error) {
          console.warn("Immediate Supabase finish failed:", error);
          return false;
        }

        pendingRunUpdate = null;
        return true;
      } catch (err) {
        console.warn("Immediate Supabase finish exception:", err);
        return false;
      }
    }

    async function sendRunnerHeartbeat() {
      if (!activeRunId) return;

      const heartbeatIso = new Date().toISOString();
      lastRunnerHeartbeatTime = Date.now();

      if (broadcasting && broadcastRef) {
        broadcastRef.update({
          runner_heartbeat_at: heartbeatIso,
          timestamp: Date.now()
        }).catch(err => {
          console.warn("Firebase heartbeat failed:", err);
        });
      }

      if (!navigator.onLine) return;

      const { error } = await supabaseClient
        .from("runs")
        .update({ runner_heartbeat_at: heartbeatIso })
        .eq("id", activeRunId);

      if (error) {
        console.warn("Supabase heartbeat failed:", error);
      }
    }

    async function flushSupabaseQueue() {
      if (isFlushingSupabase || !activeRunId) return;
      if (!navigator.onLine) return;

      isFlushingSupabase = true;

      try {
        while (pendingSupabasePoints.length > 0) {
          const pointPayload = pendingSupabasePoints[0];

          const { error } = await supabaseClient
            .from("run_points")
            .insert(pointPayload);

          if (error) {
            console.warn("Still unable to sync queued point:", error);
            showConnectionStatus("Still offline - run is saved locally", "bad");
            break;
          }

          pendingSupabasePoints.shift();
        }

        if (pendingRunUpdate) {
          const { error } = await supabaseClient
            .from("runs")
            .update(pendingRunUpdate)
            .eq("id", activeRunId);

          if (!error) pendingRunUpdate = null;
        }

        if (pendingSupabasePoints.length === 0 && !pendingRunUpdate && runnerSyncHadFailure) {
          runnerSyncHadFailure = false;
          showConnectionStatus("Connection restored - run synced", "good");
          hideConnectionStatusSoon();
        }
      } finally {
        isFlushingSupabase = false;
      }
    }

    window.addEventListener("online", flushSupabaseQueue);
    window.addEventListener("offline", () => {
      showConnectionStatus("Connection lost - saving run locally", "bad");
    });

    function resetRunDisplay() {
      pathCoords = [];
      nativePathCoords = [];
      totalDistanceMeters = 0;;
      latestRunnerDistance = 0;
      latestRunnerPace = 0;
      latestRunnerAvgPace = 0;
      latestRunnerElevFt = null;
      lastViewerData = null;
      lastViewerElapsed = 0;

      clearRunPathLayer();
      clearNativeRunPathLayer();
      if (viewerMarker) {
        viewerMarker.remove();
        viewerMarker = null;
      }

      statsBar.style.display = "none";
      statsBar.innerHTML = "";
    }

    function updateSupabaseViewerStats() {
      if (!pathCoords.length) return;

      let distMeters = 0;
      for (let i = 1; i < pathCoords.length; i++) {
        distMeters += haversineDistance(
          [pathCoords[i - 1].lon, pathCoords[i - 1].lat],
          [pathCoords[i].lon, pathCoords[i].lat]
        );
      }

      const firstTime = pathCoords[0].timestamp || Date.now();
      const lastTime = pathCoords[pathCoords.length - 1].timestamp || Date.now();
      const elapsedMs = Math.max(0, lastTime - firstTime);
      const distMiles = metersToMiles(distMeters);
      const avgPace = distMiles > 0 ? (elapsedMs / 60000) / distMiles : 0;
      const lastPoint = pathCoords[pathCoords.length - 1];
      const instPace = lastPoint.instPace ?? 0;

      const displayElevationFt =
        lastPoint.elevationFt ??
        lastViewerData?.elevationFt ??
        latestRunnerElevFt ??
        null;

      lastViewerData = {
        distance: distMiles,
        pace: instPace,
        avgPace,
        startTime: firstTime,
        current: [lastPoint.lon, lastPoint.lat],
        elevationFt: displayElevationFt
};

      lastViewerElapsed = elapsedMs;

      updateStatsDisplay(
        distMiles,
        instPace,
        avgPace,
        elapsedMs,
        displayElevationFt
      );
    }

    async function handleLocationUpdate(coord, accuracy = null, locationTime = Date.now()) {
      const now = typeof locationTime === "number"
        ? locationTime
        : new Date(locationTime).getTime();

      if (lastPointTime && now <= lastPointTime) {
        console.warn("Ignoring out-of-order location point:", new Date(now).toISOString());
        return;
      }

      if (isFollowing) {
        map.setCenter(coord);
      }

      if (!bridgeTunnelMatcher) {
        bridgeTunnelMatcher = createBridgeTunnelMatcher();
      }
      const matchResult = bridgeTunnelMatcher.process(coord, accuracy, now);
      coord = matchResult.coord;

      if (matchResult.state !== lastPublishedMatchingState) {
        lastPublishedMatchingState = matchResult.state;
        if (broadcastRef) {
          broadcastRef.update({
            matching_state: matchResult.state,
            matching_status_updated_at: new Date().toISOString()
          }).catch(err => {
            console.warn("Matching status update failed:", err);
          });
        }
      }

      if (!matchResult.matched && matchResult.state === "raw_recovery") {
        console.warn("Holding raw GPS during map-matching recovery:", accuracy, "m");
        return;
      }

      const reportedAccuracy = Number(accuracy);
      if (
        !matchResult.matched &&
        Number.isFinite(reportedAccuracy) &&
        reportedAccuracy > 10
      ) {
        console.warn("Ignoring inaccurate GPS point:", reportedAccuracy.toFixed(2), "m");
        return;
      }

      if (matchResult.matched) {
        console.log(
          `Map-matched ${matchResult.structureType} point (${matchResult.state})`
        );
      }

      let elevMeters = null;
      let elevationFt = latestRunnerElevFt;

      let instPace = 0;
      let avgPace = 0;

      if (pathCoords.length > 0) {
        const prev = pathCoords[pathCoords.length - 1];
        const segmentMeters = haversineDistance([prev.lon, prev.lat], coord);
        const elapsedSeconds = lastPointTime ? (now - lastPointTime) / 1000 : 0;
        const speedMps = elapsedSeconds > 0 ? segmentMeters / elapsedSeconds : 0;
        const speedMph = speedMps * 2.23694;

        // Keep browser filtering aligned with the app version.
        if (segmentMeters < 1) {
          console.warn("Ignoring tiny GPS movement:", segmentMeters.toFixed(2), "m");
          return;
        }

        if (elapsedSeconds <= 0) {
          console.warn("Ignoring zero/negative time point:", elapsedSeconds);
          return;
        }

        if (speedMph < 1.0) {
          console.warn("Ignoring stopped/very slow GPS drift:", speedMph.toFixed(2), "mph");
          return;
        }

        if (speedMph > 140) {
          console.warn("Ignoring unrealistic GPS jump:", speedMph.toFixed(2), "mph");
          return;
        }

        totalDistanceMeters += segmentMeters;

        const segmentMiles = metersToMiles(segmentMeters);
        const elapsedMin = lastPointTime ? (now - lastPointTime) / 60000 : 0;
        instPace = segmentMiles > 0 ? elapsedMin / segmentMiles : 0;

        const totalMin = startTime ? (now - startTime) / 60000 : 0;
        const totalMiles = metersToMiles(totalDistanceMeters);
        avgPace = totalMiles > 0 ? totalMin / totalMiles : 0;
      } else {
        startTime = now;
      }

      lastPointTime = now;

      const recordedAt = new Date(now).toISOString();

      const newPoint = {
        lat: coord[1],
        lon: coord[0],
        timestamp: now,
        time: recordedAt,
        elevation: elevMeters,
        elevationFt,
        distance: metersToMiles(totalDistanceMeters),

      latestRunnerElevFt = elevationFt;

        broadcastRef.update({

async function fetchAllNativeRunPoints(runId) {
  const pageSize = 1000;
  let from = 0;
  let allRows = [];

  while (true) {
    const to = from + pageSize - 1;
    const { data, error } = await supabaseClient
      .from("run_points_native_test")
      .select("*")
      .eq("run_id", runId)
      .order("sequence_num", { ascending: true })
      .range(from, to);

    if (error) throw error;

    allRows = allRows.concat(data || []);

    if (!data || data.length < pageSize) {
      break;
    }

    from += pageSize;
  }

  return allRows;
}

async function startNativePathComparison(runId) {
  if (!runId) return;

  if (activeNativeSupabaseChannel) {
    supabaseClient.removeChannel(activeNativeSupabaseChannel);
    activeNativeSupabaseChannel = null;
  }

  nativePathCoords = [];

  // Only show the native purple path in viewer mode.
  if (document.body.classList.contains("viewer-mode")) {
    clearNativeRunPathLayer();
  }

  let data;

  try {
    data = await fetchAllNativeRunPoints(runId);
  } catch (error) {
    console.error("Initial native path load error:", error);
    return;
  }

  nativePathCoords = data
    .map(normalizeNativeRunPoint)
    .sort((a, b) => {
      if (a.sequenceNum != null && b.sequenceNum != null) {
        return a.sequenceNum - b.sequenceNum;
      }
      return (a.timestamp || 0) - (b.timestamp || 0);
    });
  nativeRouteGapActive = hasSequenceGap(nativePathCoords);

  if (document.body.classList.contains("viewer-mode")) {
    addOrUpdateNativePath();

    if (nativePathCoords.length > 0) {
      const lastNativePoint = getLatestSequencePoint(nativePathCoords);

      updateViewerFromNativePoint(lastNativePoint);
    }
  }

  activeNativeSupabaseChannel = supabaseClient
    .channel(`native_run_${runId.replace(/-/g, "_")}`)
    .on(
      "postgres_changes",
      {
        event: "INSERT",
        schema: "public",
        table: "run_points_native_test",
        filter: `run_id=eq.${runId}`
      },
      payload => {
        const pt = payload.new;
        const previousLatestPoint = getLatestSequencePoint(nativePathCoords);
        const incomingPoint = normalizeNativeRunPoint(pt);
        const incomingSequence = incomingPoint.sequenceNum;
        const previousLatestSequence = previousLatestPoint?.sequenceNum ?? null;
        const wasConnectionLost = viewerConnectionLost;
        const wasConnectionWarning = viewerConnectionWarning;

        upsertSortedNativeRunPoint(pt);
        lastPointReceivedTime = Date.now();
        viewerConnectionWarning = false;

        if (viewerConnectionLost) {
          viewerConnectionLost = false;
        }

        const hadGap = nativeRouteGapActive;
        const hasGap = hasSequenceGap(nativePathCoords);
        nativeRouteGapActive = hasGap;

        const incomingSequenceGap =
          incomingSequence != null &&
          previousLatestSequence != null &&
          incomingSequence - previousLatestSequence > 1;
        const cleanSequentialResume =
          incomingSequence != null &&
          previousLatestSequence != null &&
          incomingSequence - previousLatestSequence === 1;

        if (incomingSequenceGap) {
          showViewerStatus("Reconnecting - rebuilding route", "good");
          hideViewerStatusSoon("Reconnecting - rebuilding route", 6000);
        } else if (hadGap && !hasGap) {
          showViewerStatus("Route restored", "good");
          hideViewerStatusSoon("Route restored", 3000);
        } else if ((wasConnectionLost || wasConnectionWarning) && cleanSequentialResume) {
          showViewerStatus("Motion detected", "good");
          hideViewerStatusSoon("Motion detected", 3000);
        } else if (!hasGap && (wasConnectionLost || wasConnectionWarning)) {
          showViewerStatus("Runner reconnected", "good");
          hideViewerStatusSoon("Runner reconnected", 3000);
        }

        // Only render purple native path and red marker in viewer mode.
        if (document.body.classList.contains("viewer-mode")) {
          addOrUpdateNativePath();
          const latestNativePoint = getLatestSequencePoint(nativePathCoords);
          if (latestNativePoint) {
            updateViewerFromNativePoint(latestNativePoint);
          }
        }
      }
    )
    .subscribe();
}
function normalizeRunPoint(pt) {
  return {
    sequenceNum: pt.sequence_num ?? null,
    lat: pt.lat,
    lon: pt.lon,
    timestamp: new Date(pt.recorded_at).getTime(),
    time: pt.recorded_at,
    elevation: pt.elevation_m,
    elevationFt: pt.elevation_m != null ? pt.elevation_m * 3.28084 : null,
    instPace: pt.inst_pace_min_per_mile ?? 0,
    avgPace: pt.avg_pace_min_per_mile ?? 0,
    distanceM: pt.distance_m ?? null
  };
}

function upsertSortedRunPoint(pt) {
  const normalized = normalizeRunPoint(pt);

  const existingIndex = pathCoords.findIndex(p =>
    p.sequenceNum != null &&
    normalized.sequenceNum != null &&
    p.sequenceNum === normalized.sequenceNum
  );

  if (existingIndex >= 0) {
    pathCoords[existingIndex] = {
      ...pathCoords[existingIndex],
      ...normalized
    };
  } else {
    pathCoords.push(normalized);
  }

  pathCoords.sort((a, b) => {
    if (a.sequenceNum != null && b.sequenceNum != null) {
      return a.sequenceNum - b.sequenceNum;
    }
    return (a.timestamp || 0) - (b.timestamp || 0);
  });
}

function normalizeNativeRunPoint(pt) {
  return {
    sequenceNum: pt.sequenceNum ?? pt.sequence_num ?? null,
    lat: pt.lat,
    lon: pt.lon,
    timestamp: pt.timestamp ?? (pt.recorded_at ? new Date(pt.recorded_at).getTime() : Date.now()),
    time: pt.time ?? pt.recorded_at ?? null,
    elevation: pt.elevation ?? pt.elevation_m ?? null,
    elevationFt:
      pt.elevationFt ??
      (pt.elevation_m != null ? pt.elevation_m * 3.28084 : null) ??
      (pt.elevation != null ? pt.elevation * 3.28084 : null),
    instPace: pt.instPace ?? pt.inst_pace_min_per_mile ?? 0,
    avgPace: pt.avgPace ?? pt.avg_pace_min_per_mile ?? 0,
    distanceM: pt.distanceM ?? pt.distance_m ?? null
  };
}

      event: "UPDATE",
      schema: "public",
      table: "runs",
      filter: `id=eq.${runId}`
    },
    payload => {
      const run = payload.new;

      if (run && run.is_live === false) {
      
if (run.final_time_ms != null && lastViewerData) {
  lastViewerElapsed = run.final_time_ms;

  updateStatsDisplay(
    lastViewerData.distance,
    lastViewerData.pace,
    lastViewerData.avgPace,
    lastViewerElapsed,
    lastViewerData.elevationFt ?? null
  );
}
        if (viewerTimerId !== null) {
          clearInterval(viewerTimerId);
          viewerTimerId = null;
        }

        if (viewerConnectionWatchId !== null) {
          clearInterval(viewerConnectionWatchId);
          viewerConnectionWatchId = null;
        }

        viewerConnectionWarning = false;
        viewerConnectionLost = false;
        nativeRouteGapActive = false;
        showViewerStatus("Run finished", "good");
        hideViewerStatusSoon("Run finished", 3000);
      }
    }
  )
  .subscribe();

activeSupabaseChannel = supabaseClient
  .channel(`run_${runId.replace(/-/g, "_")}`)
  .on(
    "postgres_changes",
    {
      event: "INSERT",
      schema: "public",
      table: "run_points",
      filter: `run_id=eq.${runId}`
    },
    payload => {
      const pt = payload.new;

      lastPointReceivedTime = Date.now();

      if (viewerConnectionLost) {
        viewerConnectionLost = false;
        showViewerStatus("Runner reconnected", "good");
        hideViewerStatusSoon("Runner reconnected", 3000);
      }

      upsertSortedRunPoint(pt);

      //addOrUpdatePath();
      //updateSupabaseViewerStats();

      /*if (!viewerMarker) {
        viewerMarker = new maplibregl.Marker({ color: "red" })
          .setLngLat([pt.lon, pt.lat])
          .addTo(map);
      } else {
        viewerMarker.setLngLat([pt.lon, pt.lat]);
      }

      if (viewerFollowing) {
        map.flyTo({ center: [pt.lon, pt.lat], zoom: 16 });
      }
       */
    }
  )
  .on(
    "postgres_changes",
    {
      event: "UPDATE",
      schema: "public",
      table: "run_points",
      filter: `run_id=eq.${runId}`
    },
    payload => {
      const pt = payload.new;
      const ptTime = new Date(pt.recorded_at).getTime();

      const existingPoint = pathCoords.find(p =>
        (p.sequenceNum != null && pt.sequence_num != null && p.sequenceNum === pt.sequence_num) ||
        p.timestamp === ptTime
      );

if (!existingPoint) return;

      existingPoint.elevation = pt.elevation_m;
      existingPoint.elevationFt = pt.elevation_m != null
        ? pt.elevation_m * 3.28084
        : null;

      existingPoint.instPace = pt.inst_pace_min_per_mile ?? existingPoint.instPace;
      existingPoint.avgPace = pt.avg_pace_min_per_mile ?? existingPoint.avgPace;
      existingPoint.distanceM = pt.distance_m ?? existingPoint.distanceM;

      //updateSupabaseViewerStats();
// Native points now control viewer stats.
// Prevent delayed JS elevation/sync updates from overwriting native stats.
    }
  )
  .subscribe();

if (isLive && viewerTimerId === null) {
  viewerTimerId = setInterval(() => {
    if (!lastViewerData) return;

    lastViewerElapsed += 1000;

    updateStatsDisplay(
      lastViewerData.distance,
      lastViewerData.pace,
      lastViewerData.avgPace,
      lastViewerElapsed,
      lastViewerData.elevationFt ?? null
    );
  }, 1000);
}
lastPointReceivedTime = Date.now();

viewerConnectionWatchId = setInterval(() => {
  if (!isLive) return;
  if (!lastPointReceivedTime) return;

  const now = Date.now();
  const secondsSinceLastPoint = (now - lastPointReceivedTime) / 1000;

  if (secondsSinceLastPoint > 45 && !viewerConnectionLost) {
    viewerConnectionLost = true;
    viewerConnectionWarning = true;
    showViewerStatus("Signal lost - waiting for runner", "bad");
  } else if (secondsSinceLastPoint > 15 && !viewerConnectionWarning) {
    viewerConnectionWarning = true;
    showViewerStatus("No motion detected - awaiting runner status", "warn");
  }
}, 3000);

}

    // -> Firebase legacy fallback viewer function kept for older Firebase-only runs
    function trackRunner(key) {
      if (activeSupabaseChannel) {
        supabaseClient.removeChannel(activeSupabaseChannel);
        activeSupabaseChannel = null;
      }
if (activeNativeSupabaseChannel) {
  supabaseClient.removeChannel(activeNativeSupabaseChannel);
  activeNativeSupabaseChannel = null;
}
      if (activeListener) {
        activeListener.off();
      }

      if (viewerTimerId !== null) {
        clearInterval(viewerTimerId);
        viewerTimerId = null;
      }

      const ref = db.ref(`runners/${key}`);
      activeListener = ref;

      ref.on("value", async snap => {
        const data = snap.val();
        if (!data || !data.current) return;

        if (!viewerMarker) {
          viewerMarker = new maplibregl.Marker({ color: "red" })
            .setLngLat(data.current)
            .addTo(map);
        } else {
          viewerMarker.setLngLat(data.current);
        }

        pathCoords = (data.path || []).map(pt => ({
          lat: pt.lat,
          lon: pt.lon,
          timestamp: pt.timestamp,
          time: pt.time,
          elevation: pt.elevation,
          elevationFt: pt.elevationFt ?? null
        }));

        addOrUpdatePath();

        lastViewerData = {
          distance: data.distance || 0,
          pace: data.pace || 0,
          avgPace: data.avgPace || 0,
          startTime: data.startTime || null,
          current: data.current,
          elevationFt: data.elevation ?? null
        };

        lastViewerElapsed = data.timestamp && data.startTime
          ? data.timestamp - data.startTime
          : lastViewerElapsed;

        let elevationFt = data.elevation ?? null;
        if (elevationFt == null && lastViewerData.current) {
          const elevM = await fetchElevation(
            lastViewerData.current[1],
            lastViewerData.current[0]
          );
          elevationFt = elevM != null ? elevM * 3.28084 : null;
          lastViewerData.elevationFt = elevationFt;
        }

        updateStatsDisplay(
          lastViewerData.distance,
          lastViewerData.pace,
          lastViewerData.avgPace,
          lastViewerElapsed,
          elevationFt
        );

        if (data.finished && viewerTimerId !== null) {
          clearInterval(viewerTimerId);
          viewerTimerId = null;
        }

if (viewerFollowing) {
  programmaticViewerMove = true;

  map.flyTo({
    center: data.current,
    zoom: 16
  });

  setTimeout(() => {
    programmaticViewerMove = false;
  }, 1000);
}
      });

      if (viewerTimerId === null) {
        viewerTimerId = setInterval(async () => {
          const nowData = (await ref.once("value")).val();
          if (nowData && nowData.finished) {
            clearInterval(viewerTimerId);
            viewerTimerId = null;
            return;
          }

          if (!lastViewerData) return;

          lastViewerElapsed += 1000;
          updateStatsDisplay(
            lastViewerData.distance,
            lastViewerData.pace,
            lastViewerData.avgPace,
            lastViewerElapsed,
            lastViewerData.elevationFt ?? null
          );
        }, 1000);
      }
    }

    layerSelect.addEventListener("change", () => {
      const newStyle = STYLES[layerSelect.value] || STYLES.satellite;
      map.setStyle(newStyle);
    });

    function convertToGPX() {
      if (!pathCoords.length) {
        return alert("No run data available to export.");
      }

      const runDate = startTime
        ? new Date(startTime).toISOString().slice(0, 10)
        : new Date().toISOString().slice(0, 10);

      const trackName = runnerName
        ? `${runnerName} - ${runDate}`
        : `LiveStride Run ${runDate}`;

      let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx creator="LiveStride" version="1.1" xmlns="http://www.topografix.com/GPX/1/1"
     xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
     xsi:schemaLocation="http://www.topografix.com/GPX/1/1
     http://www.topografix.com/GPX/1/1/gpx.xsd">
  <trk>
    <name>${trackName}</name>
    <trkseg>
`;

      pathCoords.forEach(pt => {
        const ele = pt.elevation != null ? pt.elevation : 0;
        const time = pt.time || new Date(pt.timestamp).toISOString();
        gpx += `      <trkpt lat="${pt.lat}" lon="${pt.lon}">
        <ele>${ele}</ele>
        <time>${time}</time>
      </trkpt>
`;
      });

      gpx += `    </trkseg>
  </trk>
</gpx>`;

      const blob = new Blob([gpx], { type: "application/gpx+xml" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `LiveStride_${runDate}.gpx`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function uploadToStrava() {
      window.open("https://www.strava.com/upload/select", "_blank");
    }

    exportGpxBtn.onclick = convertToGPX;
    uploadStravaBtn.onclick = uploadToStrava;
    viewerGpxBtn.onclick = () => {
      window.open("https://kdidso.github.io/livestride-export/", "_blank");
    };

    map.on("load", () => setMode("runner"));
  </script>
